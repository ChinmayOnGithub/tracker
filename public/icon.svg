<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#09090b" />
    </radialGradient>
    
    <!-- Primary Logo Gradient -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Secondary Accent Gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Maskable background -->
  <rect width="512" height="512" fill="url(#bg-grad)" />

  <!-- Center Decorative Glow -->
  <circle cx="256" cy="256" r="160" fill="#3b82f6" opacity="0.12" filter="url(#glow)" />

  <!-- Icon Design (Stacked Operations Layers) -->
  <g transform="translate(128, 118)" filter="url(#glow)">
    <!-- Bottom Layer -->
    <path d="M 30,170 L 128,215 L 226,170 L 128,125 Z" fill="url(#accent-grad)" opacity="0.4" />
    
    <!-- Middle Layer -->
    <path d="M 30,120 L 128,165 L 226,120 L 128,75 Z" fill="url(#primary-grad)" opacity="0.7" />
    
    <!-- Top Layer -->
    <path d="M 30,70 L 128,115 L 226,70 L 128,25 Z" fill="url(#primary-grad)" />
    
    <!-- Connector Lines showing integrations -->
    <path d="M 128,115 L 128,125 M 128,165 L 128,170" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.6" />
  </g>
</svg>
