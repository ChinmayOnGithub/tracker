name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun Runtime
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bunx prisma generate

      - name: Run Linting Checks
        run: bun run lint

      - name: Run TypeScript Typecheck
        run: bunx tsc --noEmit

      - name: Run Unit Tests
        run: bun test
        env:
          NODE_ENV: test

      - name: Verify Production Build
        run: bun run build
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/tracker_test?schema=public"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/tracker_test?schema=public"
          AUTH_SECRET: "test-auth-secret-32-chars-long-placeholder-key"
          GOOGLE_CLIENT_ID: "test-client-id"
          GOOGLE_CLIENT_SECRET: "test-client-secret"
          GOOGLE_OAUTH_ENCRYPTION_KEY: "test-oauth-encryption-key-32-chars-long"
          NODE_ENV: production
